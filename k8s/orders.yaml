apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-service
  template:
    metadata:
      labels:
        app: orders-service
    spec:
      containers:
      - name: orders-service
        image: orders-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3003
        env:
        # VARIABLES CLAVE PARA LA COMUNICACIÓN ENTRE KUBERNETES DNS
        - name: USERS_SERVICE_URL
          value: "http://users-service:3001"
        - name: SKILLS_SERVICE_URL
          value: "http://skills-service:3002"
        envFrom:
        - configMapRef:
            name: orders-config
---
apiVersion: v1
kind: Service
metadata:
  name: orders-service
spec:
  selector:
    app: orders-service
  ports:
    - protocol: TCP
      port: 3003
      targetPort: 3003
  type: LoadBalancer # Permite exponerlo fuera de minikube corriendo `minikube tunnel`
